modLoader="javafml"
loaderVersion="${loader_version_range}"
license="${mod_license}"

[[mods]]
modId="${mod_id}"
version="${mod_version}"
displayName="${mod_name}"
authors="${mod_authors}"
displayURL="https://github.com/KURONAMI333/trade-diary"
issueTrackerURL="https://github.com/KURONAMI333/trade-diary/issues"
description='''
${mod_description}
'''

[[dependencies.${mod_id}]]
    modId="forge"
    mandatory=true
    versionRange="${forge_version_range}"
    ordering="NONE"
    side="BOTH"

[[dependencies.${mod_id}]]
    modId="minecraft"
    mandatory=true
    versionRange="${minecraft_version_range}"
    ordering="NONE"
    side="BOTH"

# Patchouli — provides the book_brown.png texture for the diary viewer.
[[dependencies.${mod_id}]]
    modId="patchouli"
    mandatory=true
    versionRange="[1.20.1-84,)"
    ordering="NONE"
    side="BOTH"
