# Trade Diary - neoforge.mods.toml
modLoader="javafml"
loaderVersion="${loader_version_range}"

license="${mod_license}"

[[mods]]
modId="${mod_id}"
version="${mod_version}"
displayName="${mod_name}"
authors="KURONAMI"
displayURL="https://github.com/KURONAMI333/trade-diary"
issueTrackerURL="https://github.com/KURONAMI333/trade-diary/issues"
description='''
Auto-record every villager trade with timestamp, location, and trade details — your own trader's diary.
'''

[[dependencies.${mod_id}]]
    modId="neoforge"
    type="required"
    versionRange="[21.1,)"
    ordering="NONE"
    side="BOTH"

[[dependencies.${mod_id}]]
    modId="minecraft"
    type="required"
    versionRange="${minecraft_version_range}"
    ordering="NONE"
    side="BOTH"

# Patchouli — provides the book_brown.png texture used by the diary viewer.
[[dependencies.${mod_id}]]
    modId="patchouli"
    type="required"
    versionRange="[1.21.1-93,)"
    ordering="NONE"
    side="BOTH"
